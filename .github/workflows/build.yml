name: Build llama.cpp (RTX 5000 / Zen 5)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      llama_ref:
        description: 'llama.cpp git ref to build (branch, tag, or SHA). Leave empty for latest master.'
        required: false
        default: ''
      upload_artifacts:
        description: 'Upload build artifacts'
        required: false
        default: true
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LLAMA_REPO: https://github.com/ggml-org/llama.cpp.git
  BUILD_DIR: llama-src
  ARTIFACT_NAME: llama-cpp-rtx5000-win-x64

jobs:
  build-windows-cuda:
    name: Windows CUDA RTX 5000 (sm_120)
    runs-on: self-hosted

    steps:
      - name: Checkout build-pipeline repo
        uses: actions/checkout@v6.0.2

      - name: Resolve llama.cpp ref
        id: resolve
        shell: pwsh
        run: |
          $ref = "${{ github.event.inputs.llama_ref }}"
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = "master" }
          Write-Host "Building ref: $ref"
          echo "ref=$ref" >> $env:GITHUB_OUTPUT

      - name: Clone llama.cpp @ ${{ steps.resolve.outputs.ref }}
        shell: pwsh
        run: |
          git clone --depth 1 --branch ${{ steps.resolve.outputs.ref }} `
            ${{ env.LLAMA_REPO }} ${{ env.BUILD_DIR }}

      - name: Record upstream commit
        id: upstream
        shell: pwsh
        run: |
          $sha = git -C ${{ env.BUILD_DIR }} rev-parse HEAD
          $short = $sha.Substring(0,10)
          Write-Host "Upstream SHA: $sha"
          echo "sha=$sha" >> $env:GITHUB_OUTPUT
          echo "short=$short" >> $env:GITHUB_OUTPUT

      - name: Install CUDA Toolkit 13.2.0
        if: ${{ !startsWith(runner.name, 'marcus') }}
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '13.2.0'
          method: 'network'

      - name: Detect existing CUDA (self-hosted)
        if: ${{ startsWith(runner.name, 'marcus') }}
        id: cuda-existing
        shell: pwsh
        run: |
          $cudaPath = if ($env:CUDA_PATH) { $env:CUDA_PATH } else { "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2" }
          Write-Host "CUDA_PATH=$cudaPath"
          echo "CUDA_PATH=$cudaPath" >> $env:GITHUB_OUTPUT

      - name: Verify CUDA install
        shell: pwsh
        run: nvcc --version

      - name: Set CUDA env
        shell: pwsh
        run: |
          $cudaPath = "${{ steps.cuda-toolkit.outputs.CUDA_PATH || steps.cuda-existing.outputs.CUDA_PATH }}"
          "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$cudaPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Configure (instrumented)
        shell: pwsh
        run: |
          cmake -S ${{ env.BUILD_DIR }} -B build-pgo -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_CUDA_HOST_COMPILER=cl -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=120 -DGGML_AVX=ON -DGGML_AVX2=ON -DGGML_FMA=ON -DGGML_F16C=ON -DGGML_AVX_VNNI=ON -DGGML_AVX512=ON -DGGML_AVX512_VBMI=ON -DGGML_AVX512_VNNI=ON -DGGML_AVX512_BF16=ON -DGGML_NATIVE=OFF -DLLAMA_FLASH_ATTN=ON -DBUILD_SHARED_LIBS=ON "-DCMAKE_C_FLAGS=-O2 -march=znver5 -fprofile-instr-generate" "-DCMAKE_CXX_FLAGS=-O2 -march=znver5 -fprofile-instr-generate" "-DCMAKE_EXE_LINKER_FLAGS=-fprofile-instr-generate" "-DCMAKE_SHARED_LINKER_FLAGS=-fprofile-instr-generate"

      - name: Build (instrumented)
        shell: pwsh
        run: cmake --build build-pgo --parallel 4

      - name: Download profile model
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path profiles -Force
          Invoke-WebRequest `
            -Uri "https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf" `
            -OutFile profile-model.gguf -UseBasicParsing

      - name: Run profiling workload
        shell: pwsh
        run: |
          $env:LLVM_PROFILE_FILE = "${{ github.workspace }}\profiles\%p.profraw"
          $cli = "build-pgo\bin\llama-cli.exe"
          & $cli -m profile-model.gguf -ngl 0 -t 4 -n 64 -p "Explain quantum computing briefly."
          & $cli -m profile-model.gguf -ngl 0 -t 4 -n 64 -p "Write a short poem about winter."
          & $cli -m profile-model.gguf -ngl 0 -t 4 -n 128 -p "What is machine learning? Give examples."

      - name: Merge profiles
        shell: pwsh
        run: |
          $vsPath = & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' `
            -latest -products * -property installationPath
          & "$vsPath\VC\Tools\Llvm\x64\bin\llvm-profdata.exe" `
            merge -output=profiles\merged.profdata profiles\*.profraw

      - name: Configure (optimized)
        shell: pwsh
        run: |
          $prof = ("${{ github.workspace }}/profiles/merged.profdata") -replace '\\', '/'
          cmake -S ${{ env.BUILD_DIR }} -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_CUDA_HOST_COMPILER=cl `
            -DGGML_CUDA=ON `
            -DCMAKE_CUDA_ARCHITECTURES=120 `
            -DGGML_AVX=ON `
            -DGGML_AVX2=ON `
            -DGGML_FMA=ON `
            -DGGML_F16C=ON `
            -DGGML_AVX_VNNI=ON `
            -DGGML_AVX512=ON `
            -DGGML_AVX512_VBMI=ON `
            -DGGML_AVX512_VNNI=ON `
            -DGGML_AVX512_BF16=ON `
            -DGGML_NATIVE=OFF `
            -DLLAMA_FLASH_ATTN=ON `
            -DBUILD_SHARED_LIBS=ON `
            "-DCMAKE_C_FLAGS=-O3 -march=znver5 -fprofile-instr-use=$prof -fprofile-correction -flto=thin -ffast-math" `
            "-DCMAKE_CXX_FLAGS=-O3 -march=znver5 -fprofile-instr-use=$prof -fprofile-correction -flto=thin -ffast-math" `
            "-DCMAKE_EXE_LINKER_FLAGS=-flto=thin" `
            "-DCMAKE_SHARED_LINKER_FLAGS=-flto=thin"

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --parallel 4

      - name: Collect artifacts
        shell: pwsh
        run: |
          $out = "artifacts\${{ env.ARTIFACT_NAME }}"
          New-Item -ItemType Directory -Path $out -Force
          Copy-Item build\bin\*.exe $out -ErrorAction SilentlyContinue
          Copy-Item build\bin\*.dll $out -ErrorAction SilentlyContinue
          $cudaBin = "$env:CUDA_PATH\bin"
          @("cudart64_*.dll","cublas64_*.dll","cublasLt64_*.dll") | ForEach-Object {
            Copy-Item "$cudaBin\$_" $out -ErrorAction SilentlyContinue
          }
          @{
            upstream_repo   = "${{ env.LLAMA_REPO }}"
            upstream_ref    = "${{ steps.resolve.outputs.ref }}"
            upstream_sha    = "${{ steps.upstream.outputs.sha }}"
            build_date      = (Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
            cuda_arch       = "sm_120 (RTX 5000 / Blackwell)"
            compiler        = "ClangCL (VS 2022 toolset)"
            cpu_flags       = "AVX2, FMA, F16C, AVX_VNNI, AVX512, AVX512_VBMI, AVX512_VNNI, AVX512_BF16"
            pgo             = "ON (CPU paths, Qwen2.5-0.5B workload)"
            flash_attention = "ON"
          } | ConvertTo-Json | Set-Content "$out\build-info.json"
          Write-Host "Artifact contents:"
          Get-ChildItem $out | Format-Table Name, Length

      - name: Upload artifacts
        if: ${{ github.event.inputs.upload_artifacts != 'false' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.ARTIFACT_NAME }}-${{ steps.upstream.outputs.short }}
          path: artifacts/
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: build-${{ steps.upstream.outputs.short }}
          name: "Auto-build @ ${{ steps.upstream.outputs.short }}"
          body: |
            Automated build of [llama.cpp](${{ env.LLAMA_REPO }}) @ `${{ steps.upstream.outputs.sha }}`

            **Target hardware:** RTX 5000 (sm_120) + Zen 5
            **CUDA:** 13.x
            **CPU flags:** AVX2, FMA, F16C, AVX_VNNI, AVX512, AVX512-VBMI, AVX512-VNNI, AVX512-BF16
            **Flash Attention:** Enabled
          files: artifacts/**/*
          draft: false
          prerelease: false
